<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>專題成果發表 2025</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;700;900&family=Space+Mono:wght@400;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: rgba(255,255,255,0.07);
    --text: #e8e6e0;
    --muted: #6b6880;
    --accent1: #f0c060;
    --accent2: #7eb8d4;
    --accent3: #d47eb8;
    --accent4: #7ed4a0;
    --accent5: #d49e7e;
    --accent6: #a07ed4;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── NOISE OVERLAY ─── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 999; opacity: 0.4;
  }

  /* ─── HERO ─── */
  .hero {
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 0;
    position: relative;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 80% 20%, rgba(240,192,96,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 40% 60% at 10% 80%, rgba(126,184,212,0.05) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 50% 50%, rgba(160,126,212,0.04) 0%, transparent 70%);
  }

  /* ─── HEADER ─── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 2rem 4rem;
    border-bottom: 1px solid var(--border);
    position: relative; z-index: 10;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .logo span { color: var(--accent1); }

  .year-badge {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 0.35rem 0.8rem;
    border-radius: 2rem;
  }

  /* ─── HERO CONTENT ─── */
  .hero-content {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 4rem 2rem;
    position: relative; z-index: 10;
  }

  .hero-eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: var(--accent1);
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.2s forwards;
  }

  .hero-title {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(3rem, 8vw, 7rem);
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin-bottom: 1.5rem;
    opacity: 0;
    animation: fadeUp 0.9s ease 0.4s forwards;
  }

  .hero-title em {
    font-style: normal;
    color: transparent;
    -webkit-text-stroke: 1px rgba(240,192,96,0.5);
  }

  .hero-sub {
    font-size: 1rem;
    color: var(--muted);
    max-width: 420px;
    line-height: 1.7;
    margin-bottom: 3rem;
    font-weight: 300;
    opacity: 0;
    animation: fadeUp 0.9s ease 0.6s forwards;
  }

  .scroll-hint {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 0.9s ease 0.8s forwards;
    cursor: pointer;
    transition: color 0.3s;
  }
  .scroll-hint:hover { color: var(--accent1); }
  .scroll-hint svg { animation: bounce 2s infinite; }

  @keyframes bounce {
    0%,100%{ transform: translateY(0); }
    50%{ transform: translateY(5px); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ─── HERO STATS ─── */
  .hero-stats {
    display: flex;
    justify-content: center;
    gap: 4rem;
    padding: 2rem 4rem;
    border-top: 1px solid var(--border);
    position: relative; z-index: 10;
  }

  .stat { text-align: center; }
  .stat-num {
    font-family: 'Space Mono', monospace;
    font-size: 1.6rem;
    color: var(--accent1);
    display: block;
  }
  .stat-label {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-top: 0.2rem;
  }

  /* ─── PROJECTS SECTION ─── */
  #projects {
    padding: 6rem 4rem;
    max-width: 1400px;
    margin: 0 auto;
  }

  .section-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 4rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 2rem;
    font-weight: 700;
  }

  .section-count {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.15em;
  }

  /* ─── PROJECT GRID ─── */
  .project-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5px;
    background: var(--border);
    border: 1px solid var(--border);
  }

  .project-card {
    background: var(--surface);
    padding: 2.5rem;
    cursor: pointer;
    transition: background 0.3s, transform 0.3s;
    position: relative;
    overflow: hidden;
    min-height: 280px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .project-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--card-color, rgba(240,192,96,0.08));
    opacity: 0;
    transition: opacity 0.4s;
  }

  .project-card:hover::before { opacity: 1; }

  .project-card:hover .card-arrow { transform: translate(4px, -4px); }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .card-num {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.2em;
  }

  .card-icon {
    width: 44px; height: 44px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem;
    background: var(--card-color, rgba(240,192,96,0.12));
    border: 1px solid var(--card-border, rgba(240,192,96,0.2));
  }

  .card-body { margin-top: 2rem; }

  .card-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.3rem;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 0.7rem;
  }

  .card-desc {
    font-size: 0.82rem;
    color: var(--muted);
    line-height: 1.7;
    font-weight: 300;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 1.5rem;
  }

  .card-tags {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
  }

  .tag {
    font-family: 'Space Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    padding: 0.25rem 0.6rem;
    border-radius: 2rem;
    border: 1px solid var(--card-border, rgba(255,255,255,0.1));
    color: var(--card-text, var(--muted));
  }

  .card-arrow {
    transition: transform 0.3s;
    color: var(--muted);
    font-size: 1.1rem;
  }

  /* ─── MODAL ─── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(5,5,10,0.92);
    backdrop-filter: blur(20px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
  }

  .modal-overlay.active {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    max-width: 760px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    position: relative;
    transform: translateY(30px) scale(0.97);
    transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
  }

  .modal-overlay.active .modal {
    transform: translateY(0) scale(1);
  }

  .modal-header {
    padding: 2.5rem 3rem;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 1;
  }

  .modal-title-group {}
  .modal-eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    color: var(--muted);
    margin-bottom: 0.5rem;
    text-transform: uppercase;
  }
  .modal-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.8rem;
    font-weight: 700;
  }

  .modal-close {
    width: 36px; height: 36px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .modal-close:hover { background: rgba(255,255,255,0.05); color: var(--text); }

  .modal-body { padding: 2.5rem 3rem; }

  .modal-accent-bar {
    height: 3px;
    border-radius: 2px;
    margin-bottom: 2rem;
  }

  .modal-section { margin-bottom: 2rem; }
  .modal-section h3 {
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.8rem;
  }
  .modal-section p {
    font-size: 0.92rem;
    line-height: 1.8;
    color: rgba(232,230,224,0.8);
    font-weight: 300;
  }

  .modal-members {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 0.8rem;
    margin-top: 0.8rem;
  }

  .member-chip {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.6rem 0.9rem;
    border: 1px solid var(--border);
    font-size: 0.82rem;
    background: rgba(255,255,255,0.02);
  }

  .member-avatar {
    width: 26px; height: 26px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem;
    font-weight: 700;
    flex-shrink: 0;
  }

  .modal-tech {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-top: 0.8rem;
  }

  .tech-badge {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    padding: 0.3rem 0.8rem;
    border: 1px solid var(--border);
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .modal-cta {
    display: flex;
    gap: 1rem;
    margin-top: 2.5rem;
    padding-top: 2rem;
    border-top: 1px solid var(--border);
  }

  .btn-primary {
    flex: 1;
    padding: 0.9rem 1.5rem;
    border: none;
    background: var(--btn-color, var(--accent1));
    color: #0a0a0f;
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.2s;
    font-weight: 700;
  }
  .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }

  .btn-secondary {
    padding: 0.9rem 1.5rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-secondary:hover { border-color: var(--text); color: var(--text); }

  /* ─── FOOTER ─── */
  footer {
    border-top: 1px solid var(--border);
    padding: 2rem 4rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 4rem;
  }

  .footer-copy {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .footer-dots {
    display: flex;
    gap: 0.5rem;
  }
  .footer-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--border);
  }

  /* ─── RESPONSIVE ─── */
  @media(max-width: 900px) {
    header, #projects, footer { padding-left: 2rem; padding-right: 2rem; }
    .project-grid { grid-template-columns: 1fr 1fr; }
    .hero-stats { gap: 2rem; }
  }

  @media(max-width: 600px) {
    .project-grid { grid-template-columns: 1fr; }
    .hero-stats { gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
    .modal-header, .modal-body { padding: 1.5rem; }
    .modal-cta { flex-direction: column; }
  }
</style>
</head>
<body>

<!-- ── HERO ── -->
<section class="hero">
  <div class="hero-bg"></div>
  <header>
    <div class="logo">DEPT · <span>成果展</span></div>
    <div class="year-badge">2025</div>
  </header>

  <div class="hero-content">
    <p class="hero-eyebrow">Annual Project Showcase</p>
    <h1 class="hero-title">
      專題<br><em>成果</em>發表
    </h1>

    <div class="scroll-hint" onclick="document.getElementById('projects').scrollIntoView({behavior:'smooth'})">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M7 2v10M2 7l5 5 5-5"/>

  <div class="hero-stats">
    <div class="stat"><span class="stat-num">06</span><span class="stat-label">專題組別</span></div>

    <div class="stat"><span class="stat-num">1Y</span><span class="stat-label">研究歷程</span></div>

  </div>
</section>

<!-- ── PROJECTS ── -->
<section id="projects">
  <div class="section-header">
    <h2 class="section-title">專題項目</h2>
    <span class="section-count">01 — 06</span>
  </div>

  <div class="project-grid" id="projectGrid"></div>
</section>

<!-- ── MODAL ── -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title-group">
        <p class="modal-eyebrow" id="mEyebrow"></p>
        <h2 class="modal-title" id="mTitle"></h2>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-accent-bar" id="mBar"></div>
      <div class="modal-section">
        <h3>專題簡介</h3>
        <p id="mDesc"></p>
      </div>
      <div class="modal-section">
        <h3>研究目標</h3>
        <p id="mGoal"></p>
      </div>
      <div class="modal-section">
        <h3>使用技術</h3>
        <div class="modal-tech" id="mTech"></div>
      </div>
      <div class="modal-section">
        <h3>組員名單</h3>
        <div class="modal-members" id="mMembers"></div>
      </div>
      <div class="modal-cta">
        <button class="btn-primary" id="mBtn">查看完整報告</button>
        <button class="btn-secondary" onclick="closeModalDirect()">關閉</button>
      </div>
    </div>
  </div>
</div>

<!-- ── FOOTER ── -->
<footer>
  <span class="footer-copy">© 2025 專題成果發表 · ALL RIGHTS RESERVED</span>
  <div class="footer-dots">
    <div class="footer-dot" style="background:#f0c060"></div>
    <div class="footer-dot" style="background:#7eb8d4"></div>
    <div class="footer-dot" style="background:#d47eb8"></div>
    <div class="footer-dot" style="background:#7ed4a0"></div>
    <div class="footer-dot" style="background:#d49e7e"></div>
    <div class="footer-dot" style="background:#a07ed4"></div>
  </div>
</footer>

// Build Cards
const grid = document.getElementById('projectGrid');
PROJECTS.forEach((p, i) => {
  const card = document.createElement('div');
  card.className = 'project-card';
  card.style.setProperty('--card-color', p.color);
  card.style.setProperty('--card-border', p.border);
  card.style.setProperty('--card-text', p.text);
  card.style.animationDelay = `${i * 0.1}s`;
  card.innerHTML = `
    <div class="card-top">
      <span class="card-num">${p.num}</span>
      <div class="card-icon" style="background:${p.color};border-color:${p.border}">${p.icon}</div>
    </div>
    <div class="card-body">
      <h3 class="card-title">${p.title}</h3>
      <p class="card-desc">${p.shortDesc}</p>
    </div>
    <div class="card-footer">
      <div class="card-tags">${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      <span class="card-arrow">↗</span>
    </div>
  `;
  card.addEventListener('click', () => openModal(i));
  grid.appendChild(card);
});

// Modal
function openModal(i) {
  const p = PROJECTS[i];
  document.getElementById('mEyebrow').textContent = `專題 ${p.num}`;
  document.getElementById('mTitle').textContent = p.title;
  document.getElementById('mDesc').textContent = p.desc;
  document.getElementById('mGoal').textContent = p.goal;
  document.getElementById('mBar').style.background = p.gradient;
  document.getElementById('mBtn').style.background = p.text;

  const tech = document.getElementById('mTech');
  tech.innerHTML = p.tech.map(t => `<span class="tech-badge">${t}</span>`).join('');

  const members = document.getElementById('mMembers');
  const colors = [p.text];
  members.innerHTML = p.members.map((m,j) => `
    <div class="member-chip">
      <div class="member-avatar" style="background:${p.color};border:1px solid ${p.border};color:${p.text}">
        ${m[0]}
      </div>
      <span style="font-size:0.83rem">${m}</span>
    </div>
  `).join('');

  document.getElementById('modalOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}

function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModalDirect();
});

// Intersection Observer for fade-in cards
const observer = new IntersectionObserver(entries => {
  entries.forEach(el => {
    if (el.isIntersecting) el.target.style.opacity = '1';
  });
}, { threshold: 0.1 });

document.querySelectorAll('.project-card').forEach(card => {
  card.style.opacity = '0';
  card.style.transition = 'opacity 0.6s ease, background 0.3s, transform 0.3s';
  observer.observe(card);
});
</script>
