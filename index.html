<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台中二中 221專題成果發表</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&family=Space+Mono:wght@400;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050505;
    --surface: #121212;
    --border: rgba(255, 215, 0, 0.2);
    --text: #ffffff;
    --accent: #ffd700; /* 金色 */
    --accent-red: #b30000; /* 戲院紅 */
    --muted: #888888;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', 'Noto Serif TC', "Microsoft JhengHei", serif;
	-webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ──底片邊緣特效── */
  body::before, body::after {
    content: '';
    position: fixed;
    top: 0; bottom: 0;
    width: 20px;
    background-image: radial-gradient(circle, #222 5px, transparent 5px);
    background-size: 20px 40px;
    z-index: 1000;
    opacity: 0.3;
  }
  body::before { left: 0; }
  body::after { right: 0; }

  /* ── HERO ── */
  .hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&q=80&w=2070') center/cover;
    text-align: center;
    padding: 2rem;
  }

.hero-eyebrow {
  /* 優先使用思源宋體，若無則使用系統預設明體 */
  font-family: 'Microsoft JhengHei', 'Songti TC', 'serif';
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.3em; /* 增加字距更有電影質感 */
  /* 加上你之前的呼吸發光效果 */
  animation: breatheGlow 3s ease-in-out infinite;
	display: inline-block;
}	

@keyframes breatheGlow {
  0%, 100% {
    opacity: 0.5;
    text-shadow: 0 0 5px rgba(255, 215, 0, 0.5);
    transform: scale(0.95);
  }
  50% {
    opacity: 1;
    /* 這裡形成強烈的霓虹發光感 */
    text-shadow: 0 0 10px var(--accent), 
                 0 0 20px var(--accent), 
                 0 0 30px #fff;
    transform: scale(1.02);
  }
}

  .hero-title {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(2.5rem, 8vw, 6rem);
    font-weight: 900;
    line-height: 1.1;
    margin-bottom: 2rem;
  }

  @keyframes flicker {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
    55% { opacity: 0.9; }
  }

  /* ── 時刻表 SCHEDULE ── */
  .schedule-section {
    padding: 4rem 2rem;
    max-width: 1000px;
    margin: 0 auto;
  }

  .schedule-board {
    background: #111;
    border: 4px solid #333;
    border-radius: 8px;
    padding: 2rem;
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
  }

  .schedule-title {
    font-family: 'Space Mono', monospace;
    color: var(--accent);
    text-align: center;
    margin-bottom: 2rem;
    font-size: 1.5rem;
    border-bottom: 1px solid #333;
    padding-bottom: 1rem;
  }

  .schedule-item {
    display: grid;
    grid-template-columns: 100px 1fr 120px;
    padding: 1rem 0;
    border-bottom: 1px dashed #222;
    align-items: center;
  }

  .time { font-family: 'Space Mono', monospace; color: var(--accent); font-weight: bold; }
  .event { font-weight: 500; }
  .status { font-size: 0.8rem; text-align: right; color: var(--muted); text-transform: uppercase; }

  /* ── 大主題卡片 GRID ── */
  .section-label {
    text-align: center;
    margin: 4rem 0 2rem;
    font-family: 'Noto Serif TC', serif;
    font-size: 2.5rem;
  }

  .movie-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 2rem;
    padding: 2rem;
    max-width: 1400px;
    margin: 0 auto;
  }

  .poster-card {
    background: var(--surface);
    border: 1px solid var(--border);
    position: relative;
    cursor: pointer;
    transition: transform 0.4s, box-shadow 0.4s;
    overflow: hidden;
  }

  .poster-card:hover {
    transform: translateY(-10px) scale(1.02);
    box-shadow: 0 15px 40px rgba(255, 215, 0, 0.1);
  }

  .poster-img {
    height: 400px;
    width: 100%;
    background: linear-gradient(45deg, #1a1a1a, #2a2a2a);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 4rem;
  }

  .poster-info {
    padding: 1.5rem;
    border-top: 5px solid var(--accent-red);
  }

  .poster-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.5rem;
    margin-bottom: 0.5rem;
  }

  /* ── 彈窗 MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 2000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .modal-content {
    background: #1a1a1a;
    width: 100%;
    max-width: 800px;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
    border: 1px solid var(--accent);
  }

  .modal-header {
    padding: 2rem;
    background: var(--accent-red);
    color: white;
  }

  .modal-body { padding: 2rem; }

  /* ── 小主題列表 ── */
  .sub-theme-item {
    background: rgba(255,255,255,0.03);
    padding: 1.5rem;
    margin-bottom: 1rem;
    border-left: 3px solid var(--accent);
  }

  .sub-theme-title { color: var(--accent); margin-bottom: 0.5rem; }

  .close-btn {
    position: absolute; top: 1rem; right: 1rem;
    background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer;
  }

  /* ── 手機板優化 ── */
  @media (max-width: 600px) {
    .schedule-item {
      grid-template-columns: 80px 1fr;
    }
    .status { display: none; }
    .hero-title { font-size: 2.5rem; }
    .movie-grid { grid-template-columns: 1fr; }
  }
	


</style>
</head>
<body>

<section class="hero">
  <p style="color: var(--accent);">　ＴＡＩＣＨＵＮＧ　ＳＥＣＯＮＤ　ＳＥＮＩＯＲ　ＨＩＧＨ　ＳＣＨＯＯＬ&nbsp;</p>
  <h1 class="hero-title">
	  台中二中 221<br>
  專題成果發表</h1>
  
	<p class="hero-eyebrow">&nbsp; &nbsp;全台首映 現正熱映中&nbsp;</p>
</section>

<section class="schedule-section">
  <div class="schedule-board">
    <h2 class="schedule-title">PREMIERE SCHEDULE | 時刻表</h2>
    <div id="scheduleContainer">
      </div>
  </div>
</section>

<h2 class="section-label">NOW SHOWING | 正片預告</h2>

<div class="movie-grid" id="movieGrid">
  </div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-content">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <div class="modal-header">
      <p id="mCategory" style="font-family: 'Space Mono'; font-size: 0.8rem;"></p>
      <h2 id="mTitle" style="font-family: 'Noto Serif TC';"></h2>
    </div>
    <div class="modal-body" id="mBody">
      </div>
  </div>
</div>

<script>
// 1. 資料設定：時刻表
const SCHEDULE = [
  { time: "09:00", event: "開幕首映禮", status: "Coming Soon" },
  { time: "10:00", event: "人文與社會科學場次", status: "Live" },
  { time: "13:00", event: "自然與工程科學場次", status: "Upcoming" },
  { time: "15:30", event: "頒獎典禮（金獎專題）", status: "Final" }
];

// 2. 資料設定：6大主題與小主題
const THEMES = [
  {
    id: 1,
    title: "數位邊界",
    icon: "🎞️",
    category: "TECHNOLOGY",
    subThemes: [
      { title: "AI 在藝術創作中的倫理", author: "王小明", desc: "探討生成式 AI 對傳統繪畫產業的衝擊。" },
      { title: "加密貨幣與高中生理財", author: "李小華", desc: "分析青少年對去中心化金融的認知程度。" }
    ]
  },
  {
    id: 2,
    title: "綠色革命",
    icon: "🌿",
    category: "ECOLOGY",
    subThemes: [
      { title: "校園剩食轉化生物能源", author: "張大衛", desc: "實驗如何將營養午餐廢棄物有效轉化為燃料。" },
      { title: "垂直農法在都市環境的應用", author: "林阿寶", desc: "研究在教室窗邊種植水耕蔬菜的可行性。" }
    ]
  },
  {
    id: 3,
    title: "社會寓言",
    icon: "⚖️",
    category: "SOCIETY",
    subThemes: [
      { title: "當代孤獨感研究", author: "陳美美", desc: "調查社群媒體使用時間與心理寂寞的關聯。" },
      { title: "城市中的無障礙設計", author: "黃博學", desc: "實際走訪台中市區評測輪椅族友善程度。" }
    ]
  },
  {
    id: 4,
    title: "心靈探險",
    icon: "🧠",
    category: "PSYCHOLOGY",
    subThemes: [
      { title: "夢境紀錄與壓力分析", author: "周星星", desc: "透過長達三個月的夢境紀錄觀察考前壓力變化。" }
    ]
  },
  {
    id: 5,
    title: "未來遺產",
    icon: "🏺",
    category: "HISTORY",
    subThemes: [
      { title: "二中校史數位典藏", author: "何大為", desc: "利用 3D 建模技術保存校內老舊建物模型。" }
    ]
  },
  {
    id: 6,
    title: "純粹美學",
    icon: "🎨",
    category: "ARTS",
    subThemes: [
      { title: "幾何圖形在服裝設計的應用", author: "蔡依依", desc: "結合數學公式與織品設計的跨領域嘗試。" }
    ]
  }
];

// 渲染時刻表
const schContainer = document.getElementById('scheduleContainer');
SCHEDULE.forEach(item => {
  schContainer.innerHTML += `
    <div class="schedule-item">
      <div class="time">${item.time}</div>
      <div class="event">${item.event}</div>
      <div class="status">${item.status}</div>
    </div>
  `;
});

// 渲染主題海報
const movieGrid = document.getElementById('movieGrid');
THEMES.forEach(theme => {
  movieGrid.innerHTML += `
    <div class="poster-card" onclick="openModal(${theme.id})">
      <div class="poster-img">${theme.icon}</div>
      <div class="poster-info">
        <p style="color:var(--muted); font-family:'Space Mono'; font-size:0.7rem">${theme.category}</p>
        <h3 class="poster-title">${theme.title}</h3>
        <p style="color:var(--accent); font-size:0.8rem">詳情請點擊 →</p>
      </div>
    </div>
  `;
});

function openModal(id) {
  const theme = THEMES.find(t => t.id === id);
  document.getElementById('mCategory').innerText = theme.category;
  document.getElementById('mTitle').innerText = theme.title;
  
  const mBody = document.getElementById('mBody');
  mBody.innerHTML = theme.subThemes.map(sub => `
    <div class="sub-theme-item">
      <h3 class="sub-theme-title">${sub.title}</h3>
      <p style="font-size:0.8rem; color:var(--accent); margin-bottom:0.5rem">研究員：${sub.author}</p>
      <p style="font-size:0.9rem; color:#ccc; line-height:1.6">${sub.desc}</p>
    </div>
  `).join('');

  document.getElementById('modalOverlay').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').style.display = 'none';
  document.body.style.overflow = '';
}

// 點擊背景關閉
window.onclick = function(event) {
  if (event.target == document.getElementById('modalOverlay')) closeModal();
}
</script>

</body>
</html>
