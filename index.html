<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 範例頁面</title>
</head>
<body>

    <h1>這是主標題 (H1)</h1>
    <p>這是一個段落。HTML 語法用於組織架構並呈現網頁內容 [2, 13]。</p>

    <a href="https://www.google.com" target="_blank">這是一個連結到 Google 的超連結</a>

    <h2>圖片範例</h2>
    <!-- 替換 src 中的網址即可顯示圖片 -->
    <img src="https://via.placeholder.com/150" alt="範例圖片">

    <h2>常見元素</h2>
    <ul>
        <li>項目一</li>
        <li>項目二</li>
    </ul>

</body>
</html>
